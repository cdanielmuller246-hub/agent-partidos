<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mundial 2026 – Partidos del Día</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0f1624;
      --card: #131d2e;
      --card-hover: #1a2640;
      --border: rgba(255,255,255,0.07);
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d1b35 0%, #1a0a3d 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .trophy { font-size: 2.2rem; filter: drop-shadow(0 0 12px #f59e0b88); }

    .header-title h1 {
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .header-title p { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

    .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

    #date-nav { display: flex; align-items: center; gap: 0.5rem; }
    .nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: rgba(0,212,255,0.15); border-color: var(--accent); }
    #date-display {
      font-size: 0.9rem; font-weight: 600;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.8rem;
      min-width: 110px; text-align: center;
    }

    #refresh-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #fff;
      padding: 0.45rem 1rem;
      border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.4rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    #refresh-btn:hover { opacity: 0.85; transform: scale(1.03); }
    #refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #last-update { font-size: 0.72rem; color: var(--muted); }

    /* ── MAIN ── */
    main { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    /* ── SUMMARY BAR ── */
    #summary-bar {
      display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--muted);
    }
    .stat-pill span { color: var(--text); }
    .pill-live { border-color: var(--green); color: var(--green); }
    .pill-live span { color: var(--green); }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.4); }
    }

    /* ── SECTION HEADERS ── */
    .section-label {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
      margin: 1.6rem 0 0.75rem;
    }
    .section-label::after {
      content:''; flex:1; height:1px; background: var(--border);
    }
    .section-label.live-label { color: var(--green); }
    .section-label.finished-label { color: var(--muted); }
    .section-label.upcoming-label { color: var(--accent); }

    /* ── MATCH CARD ── */
    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.3rem;
      margin-bottom: 0.75rem;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      cursor: default;
    }
    .match-card:hover { background: var(--card-hover); transform: translateY(-1px); border-color: rgba(255,255,255,0.12); }
    .match-card.is-live { border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.04); }

    .card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.85rem;
    }
    .match-meta { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; }
    .match-meta .dot { width:3px; height:3px; border-radius:50%; background:var(--muted); }

    .status-badge {
      font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 6px;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .badge-live { background: rgba(16,185,129,0.2); color: var(--green); border: 1px solid rgba(16,185,129,0.4); }
    .badge-ft   { background: rgba(100,116,139,0.15); color: var(--muted); border: 1px solid rgba(100,116,139,0.2); }
    .badge-upcoming { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
    .badge-ht   { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }

    /* teams row */
    .teams-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.75rem;
    }
    .team { display: flex; align-items: center; gap: 0.65rem; }
    .team.away { flex-direction: row-reverse; text-align: right; }
    .team img {
      width: 38px; height: 38px;
      object-fit: contain;
      border-radius: 4px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }
    .team-name { font-size: 0.95rem; font-weight: 700; line-height: 1.2; }
    .team-name small { display: block; font-size: 0.7rem; font-weight: 400; color: var(--muted); }
    .team.winner .team-name { color: #fff; }

    /* score */
    .score-block { text-align: center; min-width: 70px; }
    .score {
      font-size: 1.9rem; font-weight: 900; letter-spacing: -1px;
      line-height: 1;
    }
    .score.live { color: var(--green); text-shadow: 0 0 20px rgba(16,185,129,0.4); }
    .score.ft   { color: var(--text); }
    .score.upcoming { color: var(--muted); font-size: 1.1rem; font-weight: 600; }
    .clock-text { font-size: 0.72rem; color: var(--green); font-weight: 600; margin-top: 2px; }

    /* goals */
    .goals-row {
      margin-top: 0.75rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .goal-chip {
      font-size: 0.7rem; color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .goal-chip .min { color: var(--gold); font-weight: 700; }

    /* headline */
    .headline {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      border-top: 1px solid var(--border);
      padding-top: 0.6rem;
      line-height: 1.45;
    }

    /* ── EMPTY / LOADING ── */
    #loading, #empty {
      text-align: center; padding: 4rem 1rem;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 1rem;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 1rem;
      font-size: 0.7rem; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 520px) {
      header { padding: 1rem; }
      .header-title h1 { font-size: 1.1rem; }
      .team img { width: 30px; height: 30px; }
      .team-name { font-size: 0.82rem; }
      .score { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="trophy">🏆</span>
    <div class="header-title">
      <h1>Mundial 2026</h1>
      <p>Partidos del día · Datos en vivo</p>
    </div>
  </div>
  <div class="header-right">
    <div id="date-nav">
      <button class="nav-btn" id="prev-day" title="Día anterior">&#8249;</button>
      <div id="date-display">—</div>
      <button class="nav-btn" id="next-day" title="Día siguiente">&#8250;</button>
    </div>
    <button id="refresh-btn">
      <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Actualizar
    </button>
    <span id="last-update"></span>
  </div>
</header>

<main>
  <div id="summary-bar"></div>
  <div id="matches-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Cargando partidos…</p>
    </div>
  </div>
</main>

<footer>
  Datos provistos por <a href="https://www.espn.com" target="_blank">ESPN</a> · Se actualiza cada 60 segundos durante partidos en vivo
</footer>

<script>
  // ── State ──────────────────────────────────────────────────────
  let currentDate = new Date();
  let autoRefreshTimer = null;
  let hasLive = false;

  // ── Date helpers ───────────────────────────────────────────────
  function toYMD(d) {
    return d.toISOString().slice(0, 10).replace(/-/g, '');
  }

  function formatDateDisplay(d) {
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const isYesterday = d.toDateString() === yesterday.toDateString();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const isTomorrow = d.toDateString() === tomorrow.toDateString();

    const label = d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' });
    if (isToday) return `Hoy · ${label}`;
    if (isYesterday) return `Ayer · ${label}`;
    if (isTomorrow) return `Mañana · ${label}`;
    return label;
  }

  function formatMatchTime(utcStr) {
    const d = new Date(utcStr);
    return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  // ── API ────────────────────────────────────────────────────────
  async function fetchMatches(date) {
    const ymd = toYMD(date);
    const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${ymd}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── Render ─────────────────────────────────────────────────────
  function getStatusInfo(comp) {
    const s = comp.status.type;
    const state = s.state;
    const detail = s.shortDetail || s.detail;
    const clock  = comp.status.displayClock;

    if (state === 'in') {
      const isHT = detail === 'HT';
      return { label: isHT ? 'ET' : clock, cssClass: isHT ? 'badge-ht' : 'badge-live', isLive: true, isHT };
    }
    if (state === 'post') return { label: 'FT', cssClass: 'badge-ft',       isLive: false };
    return              { label: formatMatchTime(comp.date), cssClass: 'badge-upcoming', isLive: false, isUpcoming: true };
  }

  function renderGoalChips(details, teamId) {
    return (details || [])
      .filter(d => d.scoringPlay && d.team?.id === teamId && d.athletesInvolved?.length)
      .map(d => {
        const name = d.athletesInvolved[0].shortName;
        const pen  = d.penaltyKick ? ' (P)' : d.ownGoal ? ' (OG)' : '';
        return `<span class="goal-chip">⚽ <span class="min">${d.clock.displayValue}</span> ${name}${pen}</span>`;
      }).join('');
  }

  function renderCard(event) {
    const comp = event.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home');
    const away = comp.competitors.find(c => c.homeAway === 'away');
    const si   = getStatusInfo(comp);
    const details = comp.details || [];
    const headline = comp.headlines?.[0]?.description || '';
    const group = comp.altGameNote || '';

    const homeGoals = renderGoalChips(details, home?.id);
    const awayGoals = renderGoalChips(details, away?.id);
    const anyGoals  = homeGoals || awayGoals;

    const scoreClass = si.isLive ? 'live' : si.isUpcoming ? 'upcoming' : 'ft';
    const scoreText  = si.isUpcoming
      ? `<span class="score upcoming">vs</span>`
      : `<span class="score ${scoreClass}">${home?.score} – ${away?.score}</span>`;

    const liveDot = si.isLive ? `<span class="live-dot"></span>` : '';

    return `
    <div class="match-card ${si.isLive ? 'is-live' : ''}">
      <div class="card-top">
        <div class="match-meta">
          <span>${group}</span>
          ${comp.venue?.displayName ? `<span class="dot"></span><span>${comp.venue.displayName}</span>` : ''}
        </div>
        <span class="status-badge ${si.cssClass}">${liveDot}${si.label}</span>
      </div>

      <div class="teams-row">
        <div class="team home ${home?.winner ? 'winner' : ''}">
          <img src="${home?.team?.logo || ''}" alt="${home?.team?.displayName}" onerror="this.style.display='none'"/>
          <div class="team-name">
            ${home?.team?.displayName}
            <small>${home?.team?.abbreviation}</small>
          </div>
        </div>

        <div class="score-block">
          ${scoreText}
          ${si.isLive && !si.isHT ? `<div class="clock-text">${si.label}</div>` : ''}
          ${si.isUpcoming ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:4px">${formatMatchTime(comp.date)}</div>` : ''}
        </div>

        <div class="team away ${away?.winner ? 'winner' : ''}">
          <img src="${away?.team?.logo || ''}" alt="${away?.team?.displayName}" onerror="this.style.display='none'"/>
          <div class="team-name">
            ${away?.team?.displayName}
            <small>${away?.team?.abbreviation}</small>
          </div>
        </div>
      </div>

      ${anyGoals ? `<div class="goals-row">${homeGoals}${awayGoals}</div>` : ''}
      ${headline ? `<div class="headline">💬 ${headline}</div>` : ''}
    </div>`;
  }

  function renderAll(data) {
    const container = document.getElementById('matches-container');
    const summaryBar = document.getElementById('summary-bar');
    const events = data.events || [];

    if (!events.length) {
      container.innerHTML = `<div id="empty"><p style="font-size:2rem">😴</p><p style="margin-top:.5rem">Sin partidos para este día</p></div>`;
      summaryBar.innerHTML = '';
      return;
    }

    const live     = events.filter(e => e.competitions[0].status.type.state === 'in');
    const finished = events.filter(e => e.competitions[0].status.type.state === 'post');
    const upcoming = events.filter(e => e.competitions[0].status.type.state === 'pre');

    hasLive = live.length > 0;

    // Summary bar
    summaryBar.innerHTML = `
      <div class="stat-pill"><span>${events.length}</span> partidos</div>
      ${live.length ? `<div class="stat-pill pill-live"><span class="live-dot"></span><span>${live.length} en vivo</span></div>` : ''}
      ${finished.length ? `<div class="stat-pill"><span>${finished.length}</span> finalizados</div>` : ''}
      ${upcoming.length ? `<div class="stat-pill"><span>${upcoming.length}</span> por jugar</div>` : ''}
    `;

    let html = '';

    if (live.length) {
      html += `<div class="section-label live-label">🔴 En vivo</div>`;
      html += live.map(renderCard).join('');
    }
    if (upcoming.length) {
      html += `<div class="section-label upcoming-label">🕐 Próximos</div>`;
      html += upcoming.map(renderCard).join('');
    }
    if (finished.length) {
      html += `<div class="section-label finished-label">✅ Finalizados</div>`;
      html += finished.map(renderCard).join('');
    }

    container.innerHTML = html;
  }

  // ── Load & refresh ─────────────────────────────────────────────
  async function load(showSpinner = true) {
    if (showSpinner) {
      document.getElementById('matches-container').innerHTML =
        `<div id="loading"><div class="spinner"></div><p>Cargando partidos…</p></div>`;
    }

    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    try {
      const data = await fetchMatches(currentDate);
      renderAll(data);

      const now = new Date();
      document.getElementById('last-update').textContent =
        `Actualizado: ${now.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    } catch(err) {
      document.getElementById('matches-container').innerHTML =
        `<div id="empty"><p style="font-size:2rem">⚠️</p><p style="margin-top:.5rem">Error al cargar datos.<br><small>${err.message}</small></p></div>`;
    } finally {
      btn.classList.remove('spinning');
    }

    scheduleRefresh();
  }

  function scheduleRefresh() {
    clearTimeout(autoRefreshTimer);
    const interval = hasLive ? 60_000 : 5 * 60_000;
    autoRefreshTimer = setTimeout(() => load(false), interval);
  }

  // ── Date navigation ────────────────────────────────────────────
  function updateDateDisplay() {
    document.getElementById('date-display').textContent = formatDateDisplay(currentDate);
  }

  document.getElementById('prev-day').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() - 1);
    updateDateDisplay();
    load();
  });

  document.getElementById('next-day').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() + 1);
    updateDateDisplay();
    load();
  });

  document.getElementById('refresh-btn').addEventListener('click', () => load(false));

  // ── Init ───────────────────────────────────────────────────────
  updateDateDisplay();
  load();
</script>
</body>
</html>
